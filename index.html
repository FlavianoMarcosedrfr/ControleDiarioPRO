<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle Diário PRO+</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f5dc;
  margin: 0;
  transition: 0.3s;
}

header {
  background: #2e7d32;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  background: white;
  padding: 20px;
  margin: 20px;
  border-radius: 10px;
}

.task {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
}

button {
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #2e7d32;
  color: white;
  cursor: pointer;
}

.result {
  margin-top: 15px;
  padding: 10px;
  background: #eee;
  border-radius: 8px;
}

.dark {
  background: #121212;
  color: white;
}

.dark .container {
  background: #1e1e1e;
}

canvas {
  max-width: 100%;
}
</style>
</head>

<body>

<header>📊 Controle Diário PRO+</header>

<div style="text-align:center; margin:10px;">
<button onclick="toggleDark()">🌙 Modo</button>
</div>

<div class="container" id="capture">

<h3>📅 <span id="dataHoje"></span></h3>

<h2>✅ TASK</h2>

<div class="task">🍺 Cerveja <span id="c1">0</span> <button onclick="add('c1',true)">+</button></div>
<div class="task">📦 NAB <span id="c2">0</span> <button onclick="add('c2',true)">+</button></div>
<div class="task">🛒 Market <span id="c3">0</span> <button onclick="add('c3',true)">+</button></div>
<div class="task">📊 Volume <span id="c4">0</span> <button onclick="add('c4',true)">+</button></div>

<h3>🎯 Metas</h3>
<div class="task">TASK (35) <span id="c5">0</span></div>
<div class="task">MISSÃO (10) <span id="c6">0</span> <button onclick="add('c6')">+</button></div>
<div class="task">DESAFIOS (10) <span id="c7">0</span> <button onclick="add('c7')">+</button></div>

<div class="result" id="resultado">Aguardando...</div>

</div>

<div style="margin:20px;">
<button onclick="finalizar()">🏁 Finalizar</button>
<button onclick="reset()">🔄 Reset</button>
<button onclick="grafico()">📈 Gráfico</button>
<button onclick="abrirForms()">📝 Forms</button>
</div>

<canvas id="chart" style="display:none;"></canvas>

<script>

const metas = {c5:35,c6:10,c7:10};

// DATA PADRÃO
const hoje = new Date().toISOString().split('T')[0];
document.getElementById("dataHoje").innerText = hoje;

// CARREGAR
window.onload = () => {
  let banco = JSON.parse(localStorage.getItem("controle")) || {};

  if(banco[hoje]){
    Object.keys(banco[hoje]).forEach(id=>{
      document.getElementById(id).innerText = banco[hoje][id];
    });
  }

  if(localStorage.getItem("dark")==="true"){
    document.body.classList.add("dark");
  }

  pedirPermissao();
}

// SALVAR
function salvar(){
  let banco = JSON.parse(localStorage.getItem("controle")) || {};
  let dados = {};

  ["c1","c2","c3","c4","c5","c6","c7"].forEach(id=>{
    dados[id] = parseInt(document.getElementById(id).innerText);
  });

  banco[hoje] = dados;
  localStorage.setItem("controle", JSON.stringify(banco));
}

// ADD
function add(id, somaTask=false){
  let el = document.getElementById(id);
  el.innerText = parseInt(el.innerText) + 1;

  if(somaTask){
    let t = document.getElementById("c5");
    t.innerText = parseInt(t.innerText) + 1;
  }

  salvar();
}

// RESET
function reset(){
  if(confirm("Tem certeza?")){
    let banco = JSON.parse(localStorage.getItem("controle")) || {};
    delete banco[hoje];
    localStorage.setItem("controle", JSON.stringify(banco));

    ["c1","c2","c3","c4","c5","c6","c7"].forEach(id=>{
      document.getElementById(id).innerText = 0;
    });

    document.getElementById("resultado").innerText = "Resetado!";
  }
}

// FINALIZAR
function finalizar(){
  let res = "";

  res += "TASK: " + (c5.innerText>=metas.c5?"✅":"❌")+"<br>";
  res += "MISSÃO: " + (c6.innerText>=metas.c6?"✅":"❌")+"<br>";
  res += "DESAFIOS: " + (c7.innerText>=metas.c7?"✅":"❌")+"<br>";

  res += "<br><button onclick='foto()'>📷 Salvar</button>";

  document.getElementById("resultado").innerHTML = res;
}

// FOTO
function foto(){
  html2canvas(document.getElementById("capture")).then(canvas=>{
    let a = document.createElement("a");
    a.href = canvas.toDataURL();
    a.download = "relatorio_"+hoje+".png";
    a.click();
  });
}

// DARK MODE
function toggleDark(){
  document.body.classList.toggle("dark");
  localStorage.setItem("dark", document.body.classList.contains("dark"));
}

// GRAFICO
let graficoAtual;

function grafico(){
  document.getElementById("chart").style.display = "block";

  const ctx = document.getElementById("chart").getContext("2d");

  if(graficoAtual){
    graficoAtual.destroy();
  }

  graficoAtual = new Chart(ctx,{
    type:'bar',
    data:{
      labels:["Cerveja","NAB","Market","Volume"],
      datasets:[{
        label:"Produção",
        data:[
          +c1.innerText,
          +c2.innerText,
          +c3.innerText,
          +c4.innerText
        ]
      }]
    }
  });
}

// 🔗 ABRIR FORMS
function abrirForms(){
  window.open("https://docs.google.com/forms/d/e/1FAIpQLSeS9OY-okFbDn9Ivn-sFT6mk_p20v1B6TWPh7Bmu0gkkecP6Q/viewform", "_blank");
}

// 🔔 NOTIFICAÇÕES
function pedirPermissao(){
  if(Notification.permission !== "granted"){
    Notification.requestPermission();
  }
}

function notificar(msg){
  if(Notification.permission === "granted"){
    new Notification(msg);
  }
}

function verificarHorario(){

  const agora = new Date();
  const dia = agora.getDay();

  if(dia >= 1 && dia <= 5){

    const hora = agora.getHours();
    const minuto = agora.getMinutes();

    if(hora === 11 && minuto === 55){
      notificar("⏰ Enviar relatório das 12h!");
    }

    if(hora === 14 && minuto === 55){
      notificar("⏰ Enviar relatório das 15h!");
    }
  }
}

// roda a cada 30s
setInterval(verificarHorario, 30000);

// SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
